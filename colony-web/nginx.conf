server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    access_log /opt/logs/access.log;
    error_log /opt/logs/error.log;

    location / {
        try_files $uri /index.html;
    }

    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }
}